version: '3.8'
services:
  mongodb:
    image: mongo:latest
    container_name: meu-mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: senha123

  api:
    build: .
    container_name: api_node
    ports:
      - "3000:3000"
    depends_on:
      - mongodb
    environment:
      MONGO_URI: mongodb://admin:senha123@mongodb:27017/meu-app?authSource=admin